# Skill PR Addresser Configuration
# This file provides default configuration for the skill-pr-addresser CLI.

[skill-pr-addresser]
# GitHub repository settings
repo_owner = aRustyDev
repo_name = ai

# Iteration limits
max_iterations = 3

# Rate limiting (seconds between API calls)
rate_limit_delay = 1.0

# Worktree base directory
worktree_base = /private/tmp/worktrees

# Base branch for worktrees
base_branch = main

[otel]
# OpenTelemetry settings for observability
enabled = false
endpoint = http://localhost:4317
service_name = skill-pr-addresser
version = 0.1.0

name: pr-creator
description: Creates pull request with proper format and links
model: claude-3-5-sonnet-latest

allowed_tools:
  - Bash  # For git commands
  - Read
  - mcp__github__create_pull_request
  - mcp__github__issue_read
  - mcp__github__add_issue_comment

included_skills: []

max_input_tokens: 30000
max_output_tokens: 5000

output_format: json
output_schema:
  type: object
  properties:
    pr_number:
      type: integer
    pr_url:
      type: string
    branch_name:
      type: string
    title:
      type: string
    linked_issues:
      type: array
      items:
        type: integer
    files_changed:
      type: integer
    insertions:
      type: integer
    deletions:
      type: integer
  required: [pr_number, pr_url, branch_name, title]

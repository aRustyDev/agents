[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    roundtrip: marks tests as roundtrip tests
    preservation: marks tests as preservation level tests
    l1: marks tests for L1 (syntactic) equivalence
    l2: marks tests for L2 (operational) equivalence
    l3: marks tests for L3 (semantic) equivalence

# Output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout for tests (requires pytest-timeout)
timeout = 60
timeout_method = signal

# Parallel execution (requires pytest-xdist)
# addopts = -n auto

# Coverage (requires pytest-cov)
# addopts = --cov=tools --cov-report=html

# Minimum version
minversion = 7.0

# Test session options
norecursedirs =
    .git
    __pycache__
    .pytest_cache
    .mypy_cache

# Console output
console_output_style = progress

      - "Pattern matching for instanceof"
      - "Records"
      - "Text blocks"
      - "Switch expressions"

  - version: "21"
    release_date: "2023-09"
    status: latest_lts
    conversion_notes:
      - "Virtual threads"
      - "Record patterns"
      - "Pattern matching for switch"
      - "Sequenced collections"
      - "String templates (preview)"

skill_coverage:

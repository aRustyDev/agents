# Registry Access Patterns
# Purpose: Enable future "skill-searcher" or "skill-builder" skills
# Created: 2026-03-08
# Phase: 2 (supplement)

# ============================================
# MULTI-COMPONENT REGISTRIES
# ============================================

buildwithclaude:
  url: "https://buildwithclaude.com/"
  component_types:
    - skills
    - agents
    - commands
    - hooks
    - plugins

  access:
    method: "WebFetch"
    auth_required: false
    js_rendered: false

  endpoints:
    skills:
      url: "https://buildwithclaude.com/skills"
      format: "HTML (parseable)"
      example:
        tool: "WebFetch"
        prompt: "Extract all skill names, descriptions, and install commands"
      install_pattern: "/plugin marketplace add {author}/{name}"

    agents:
      url: "https://buildwithclaude.com/agents"
      count: 117
      format: "HTML"

    commands:
      url: "https://buildwithclaude.com/commands"
      count: 175
      format: "HTML"

    hooks:
      url: "https://buildwithclaude.com/hooks"
      count: 28
      format: "HTML"

    plugins:
      url: "https://buildwithclaude.com/plugins"
      count: 50
      format: "HTML"

  search:
    available: true
    method: "URL query param"
    example: "https://buildwithclaude.com/skills?search=typescript"

  notes: |
    Primary unified marketplace. HTML-based but well-structured.
    Categories filter available. CLI install commands provided.

github:
  url: "https://github.com"
  component_types:
    - skills
    - agents
    - commands
    - rules
    - prompts
    - hooks
    - mcp_servers

  access:
    method: "gh CLI"
    auth_required: false  # for search; rate-limited without auth
    rate_limit: "10 requests/min unauthenticated, 30/min authenticated"

  endpoints:
    skills:
      search_query: "claude skills in:readme language:markdown"
      topic_search: "topic:claude-skills"
      example:
        bash: |
          # Search by topic
          gh api search/repositories \
            -f q="topic:claude-skills" \
            -f sort=stars \
            -f per_page=30 \
            --jq '.items[] | {name: .full_name, stars: .stargazers_count, url: .html_url}'

          # Search README content
          gh api search/repositories \
            -f q="claude skills in:readme" \
            --jq '.items[].full_name'
      response_format: "JSON"

    agents:
      search_query: "claude code agents in:readme"
      topic_search: "topic:claude-code-agents OR topic:claude-subagents"
      example:
        bash: |
          gh api search/repositories \
            -f q="topic:claude-code-agents OR topic:claude-subagents" \
            -f sort=stars \
            --jq '.items[] | {name: .full_name, stars: .stargazers_count}'

    commands:
      search_query: "path:.claude/commands extension:md"
      example:
        bash: |
          # Find repos with .claude/commands directories
          gh api search/code \
            -f q="path:.claude/commands extension:md" \
            --jq '.items[] | {repo: .repository.full_name, path: .path}'

    rules:
      search_query: "path:.claude/rules extension:md"
      example:
        bash: |
          gh api search/code \
            -f q="path:.claude/rules extension:md" \
            --jq '.items[] | {repo: .repository.full_name, path: .path}'

    prompts:
      search_query: "CLAUDE.md in:path"
      output_styles_query: "path:output-styles extension:md"
      example:
        bash: |
          # Find CLAUDE.md files
          gh api search/code \
            -f q="filename:CLAUDE.md" \
            --jq '.items[] | {repo: .repository.full_name, path: .path}'

          # Find output styles
          gh api search/code \
            -f q="path:output-styles extension:md" \
            --jq '.items[].repository.full_name' | sort -u

    hooks:
      search_query: "claude code hooks in:readme"
      topic_search: "topic:claude-code-hooks"
      example:
        bash: |
          gh api search/repositories \
            -f q="topic:claude-code-hooks" \
            -f sort=stars \
            --jq '.items[] | {name: .full_name, stars: .stargazers_count}'

    mcp_servers:
      topic_search: "topic:mcp-server"
      topic_count: 8741
      example:
        bash: |
          # By topic (most reliable)
          gh api search/repositories \
            -f q="topic:mcp-server" \
            -f sort=stars \
            -f per_page=100 \
            --jq '.items[] | {name: .full_name, stars: .stargazers_count, lang: .language}'

          # By org (official implementations)
          gh api repos/github/github-mcp-server --jq '{name, stars: .stargazers_count}'
          gh api repos/awslabs/mcp --jq '{name, stars: .stargazers_count}'

  notes: |
    Most comprehensive source. Use topic search for structured results.
    Code search has 1000 result limit. Rate limits apply.

# ============================================
# SKILLS-FOCUSED REGISTRIES
# ============================================

skillsmp:
  url: "https://skillsmp.com/"
  component_types:
    - skills

  access:
    method: "API"
    auth_required: true
    auth_type: "Bearer token"
    credential_source: "op://Developer/skillsmp/credential"
    web_blocked: true  # Cloudflare protection

  endpoints:
    search:
      path: "/api/v1/skills/search"
      method: "GET"
      params:
        q: "search term (required)"
        limit: "results per page (default 10)"
        page: "pagination (default 1)"
      example:
        bash: |
          SKILLSMP_KEY=$(op read "op://Developer/skillsmp/credential")

          # Basic search
          curl -s "https://skillsmp.com/api/v1/skills/search?q=typescript&limit=20" \
            -H "Authorization: Bearer $SKILLSMP_KEY" | jq '.data.skills[]'

          # Paginated enumeration
          for page in 1 2 3 4 5; do
            curl -s "https://skillsmp.com/api/v1/skills/search?q=code&limit=100&page=$page" \
              -H "Authorization: Bearer $SKILLSMP_KEY" | jq '.data.skills[].name'
          done
      response_schema:
        success: "boolean"
        data:
          skills: "array of skill objects"
          pagination:
            page: "number"
            limit: "number"
            total: "number"
            hasNext: "boolean"
        skill_object:
          id: "string"
          name: "string"
          author: "string (GitHub username)"
          description: "string"
          githubUrl: "string"
          skillUrl: "string"
          stars: "number"
          updatedAt: "string (unix timestamp)"

    ai_search:
      path: "/api/v1/skills/ai-search"
      method: "GET"
      params:
        q: "natural language query"
      status: "untested"
      notes: "Semantic search endpoint - may return better relevance"

  limitations:
    - "No enumeration/listing endpoint"
    - "Must search to discover"
    - "Cloudflare blocks WebFetch"

  notes: |
    Largest skill registry (2000+ claimed). API is fast (~170ms).
    Best for targeted keyword searches.


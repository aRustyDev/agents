# ============================================
# ACCESS PATTERN SUMMARY
# ============================================

summary:
  by_access_method:
    api_with_auth:
      - skillsmp

    api_no_auth:
      - github

    webfetch:
      - buildwithclaude
      - ccpm
      - claude_plugins_dev
      - agentskills_best
      - mcpservers_org
      - glama_ai

    crawl4ai_required:
      - mcp_so

    gh_cli:
      - github
      - voltagent_subagents
      - awesome_claude_skills
      - awesome_claude_code
      - agents_md
      - claude_code_system_prompts

  by_component_type:
    skills:
      - skillsmp (API, 2000+)
      - buildwithclaude (WebFetch, 26)
      - ccpm (WebFetch, 22)
      - github (gh CLI, topic search)
      - awesome_claude_skills (gh CLI, 78+)

    agents:
      - buildwithclaude (WebFetch, 117)
      - voltagent_subagents (gh CLI, 127+)
      - github (gh CLI, topic search)

    commands:
      - buildwithclaude (WebFetch, 175)
      - github (gh CLI, path search)

    hooks:
      - buildwithclaude (WebFetch, 28)
      - github (gh CLI, topic search)

    mcp_servers:
      - mcp_so (crawl4ai, 18000+)
      - glama_ai (WebFetch/API, 18000+)
      - github (gh CLI, 8741 topic)

    prompts:
      - agents_md (gh CLI, spec)
      - claude_code_system_prompts (gh CLI, 5518 stars)
      - github (gh CLI, filename search)

    rules:
      - github (gh CLI, path search)
      # Rules typically bundled in plugins, not standalone

  recommended_first_choice:
    skills: "skillsmp API + github topic:claude-skills"
    agents: "buildwithclaude + voltagent_subagents"
    commands: "buildwithclaude + github path:.claude/commands"
    hooks: "buildwithclaude + github topic:claude-code-hooks"
    mcp_servers: "github topic:mcp-server (most reliable)"
    prompts: "github filename:CLAUDE.md + agents_md"
    rules: "github path:.claude/rules"

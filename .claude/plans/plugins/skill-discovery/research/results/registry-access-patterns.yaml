# ============================================
# MCP SERVER REGISTRIES
# ============================================

mcp_so:
  url: "https://mcp.so/"
  component_types:
    - mcp_servers

  access:
    method: "crawl4ai or Playwright"
    auth_required: false
    js_rendered: true  # Heavy JavaScript

  endpoints:
    browse:
      url: "https://mcp.so/"
      format: "JavaScript-rendered HTML"
      example:
        tool: "crawl4ai"
        code: |
          # Requires crawl4ai MCP
          mcp__crawl4ai__md(url="https://mcp.so/", wait_for="div.server-card")

    search:
      url_pattern: "https://mcp.so/search?q={query}"
      format: "JavaScript-rendered"

  claimed_count: "18,000+"

  limitations:
    - "Heavy JavaScript rendering required"
    - "WebFetch returns partial content"
    - "No documented API"

  notes: |
    Largest MCP registry by claimed count.
    Requires headless browser for full access.

glama_ai:
  url: "https://glama.ai/mcp/servers"
  component_types:
    - mcp_servers

  access:
    method: "WebFetch or API"
    auth_required: false
    js_rendered: "partial"

  endpoints:
    browse:
      url: "https://glama.ai/mcp/servers"
      format: "HTML with JSON data"
      example:
        tool: "WebFetch"
        prompt: "Extract server names, descriptions, and GitHub URLs from the page"

    api:
      url: "https://glama.ai/api/mcp/servers"
      status: "unverified"
      notes: "API may exist - needs probing"

  claimed_count: "18,000+"

  notes: |
    Alternative to mcp.so. May have API access.
    Less JavaScript-heavy than mcp.so.

mcpservers_org:
  url: "https://mcpservers.org/"
  component_types:
    - mcp_servers
    - skills  # has /claude-skills section

  access:
    method: "WebFetch"
    auth_required: false

  endpoints:
    mcp_servers:
      url: "https://mcpservers.org/"
      format: "HTML"

    skills:
      url: "https://mcpservers.org/claude-skills"
      format: "HTML"
      example:
        tool: "WebFetch"
        prompt: "List all Claude skills with their names and descriptions"

  notes: |
    Community MCP directory with skills section.

smithery:
  url: "https://smithery.ai/"

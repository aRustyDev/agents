# Plugin Structure Analysis
# Phase 3: Plugin Discovery
# Executed: 2026-03-08

samples_analyzed: 14

# ============================================
# PLUGIN MANIFEST PATTERNS
# ============================================

patterns:
  minimal:
    description: "Basic metadata only - no explicit component references"
    examples:
      - "claude-mem"
      - "claude-hud"
      - "safety-net"
      - "adversarial-spec"
      - "arscontexta"
      - "obsidian-skills"
      - "superpowers"
      - "everything-claude-code"
    fields:
      required:
        - name
        - version
        - description
      common:
        - author
        - repository
        - license
        - keywords
        - homepage

  component_bundling:
    description: "Explicit component directories via includes or direct fields"
    examples:
      - "claude-forge"
      - "ralph-wiggum-marketer"
      - "cc-blueprint-toolkit"
      - "superpowers-chrome"
    patterns:
      includes_object:
        example: "claude-forge"
        fields: ["agents", "skills", "hooks", "rules", "commands", "scripts"]
      direct_paths:
        example: "ralph-wiggum-marketer"
        fields: ["commands", "skills", "hooks"]
      array_paths:
        example: "cc-blueprint-toolkit"
        fields: ["commands", "agents"]

  mcp_integration:
    description: "Plugins that provide MCP servers"
    examples:
      - "claude-flow"
      - "chrome-devtools-mcp"
      - "superpowers-chrome"
      - "cc-blueprint-toolkit"
    pattern:
      field: "mcpServers"
      structure: "object with named servers"
      server_fields:
        - command
        - args
        - description
        - optional


# ============================================
# KEY OBSERVATIONS
# ============================================

observations:
  - finding: "57% of plugins use minimal pattern (metadata only)"
    implication: "Component bundling is implicit via directory convention"

  - finding: "MCP servers are the most explicit component (29% of plugins)"
    implication: "MCP requires explicit config due to runtime requirements"

  - finding: "Many plugins mention components in description but not manifest"
    examples: ["arscontexta: 26 commands", "claude-flow: 150+ commands"]
    implication: "Component counts from descriptions != manifest declarations"

  - finding: "Three bundling patterns exist"
    patterns:
      - "includes: {type: 'dir/'} - directory mapping"
      - "type: ['path1', 'path2'] - explicit file arrays"
      - "type: './dir/' - single path string"

  - finding: "Enterprise plugins have most MCP servers"
    examples: ["claude-flow: 3 servers", "superpowers-chrome: 1 server"]

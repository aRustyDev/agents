# =============================================================================
# External Messaging/Pipeline Configuration Pattern
# =============================================================================
# Use this pattern when chart connects to EXISTING external messaging or
# pipeline orchestration services.
#
# Supports: Apache Airflow, Apache Kafka, RabbitMQ, Redis (as message broker)
#
# Usage:
#   1. Copy the relevant values section to your values.yaml
#   2. Copy the environment variable section to your deployment.yaml
#   3. Customize based on your application's client library
# =============================================================================

# -----------------------------------------------------------------------------
# AIRFLOW - Pipeline Orchestration
# -----------------------------------------------------------------------------
# Use when application triggers or manages Airflow DAGs via REST API

airflow:
  # -- Enable Airflow integration for pipeline orchestration
  enabled: true

  # -- Airflow webserver URL (e.g., http://airflow-webserver:8080)
  host: ""

  # -- Airflow API username
  username: "admin"

  # -- Airflow API password (use existingSecret in production)
  password: ""

  # -- Use existing Kubernetes secret for Airflow credentials
  existingSecret: ""

  # -- Key in existing secret containing the password
  existingSecretKey: "password"

  # -- API timeout in seconds
  timeout: 60

  # -- Number of retry attempts for API calls
  retries: 3

  # -- Verify SSL certificates
  verifySsl: true

  # -- Custom CA certificate path (if using self-signed certs)
  caCertPath: ""

# Airflow environment variables template:
# {{- if .Values.airflow.enabled }}
# - name: AIRFLOW_HOST
#   value: {{ .Values.airflow.host | quote }}
# - name: AIRFLOW_USERNAME
#   value: {{ .Values.airflow.username | quote }}
# - name: AIRFLOW_PASSWORD
#   {{- if .Values.airflow.existingSecret }}
#   valueFrom:
#     secretKeyRef:
#       name: {{ .Values.airflow.existingSecret }}
#       key: {{ .Values.airflow.existingSecretKey }}
#   {{- else }}
#   value: {{ .Values.airflow.password | quote }}
#   {{- end }}
# - name: AIRFLOW_TIMEOUT
#   value: {{ .Values.airflow.timeout | quote }}
# - name: AIRFLOW_VERIFY_SSL
#   value: {{ .Values.airflow.verifySsl | quote }}
# {{- end }}

# -----------------------------------------------------------------------------
# KAFKA - Event Streaming
# -----------------------------------------------------------------------------
# Use when application produces or consumes Kafka messages

kafka:
  # -- Enable Kafka integration
  enabled: false

  # -- Kafka bootstrap servers (comma-separated list)
  # Example: "kafka-0.kafka:9092,kafka-1.kafka:9092"
  bootstrapServers: ""

  # -- Security protocol: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
  securityProtocol: "PLAINTEXT"

  # -- SASL mechanism: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512, GSSAPI, OAUTHBEARER
  saslMechanism: ""

  # -- SASL username (for PLAIN, SCRAM mechanisms)
  username: ""

  # -- SASL password (use existingSecret in production)
  password: ""

  # -- Use existing Kubernetes secret for Kafka credentials
  existingSecret: ""

  # -- Key in existing secret containing the password
  existingSecretKey: "password"

  # -- Schema Registry URL (if using Avro/Protobuf schemas)
  schemaRegistry:
    enabled: false
    url: ""
    username: ""
    password: ""

  # -- SSL/TLS configuration
  ssl:
    # -- Enable SSL/TLS
    enabled: false
    # -- Path to trust store
    trustStorePath: ""
    # -- Trust store password
    trustStorePassword: ""
    # -- Path to key store (for mTLS)
    keyStorePath: ""
    # -- Key store password
    keyStorePassword: ""

  # -- Consumer configuration
  consumer:
    # -- Consumer group ID
    groupId: ""
    # -- Auto offset reset: earliest, latest, none
    autoOffsetReset: "earliest"

  # -- Producer configuration
  producer:
    # -- Acknowledgment mode: 0, 1, all
    acks: "all"
    # -- Compression type: none, gzip, snappy, lz4, zstd
    compression: "none"

# Kafka environment variables template:
# {{- if .Values.kafka.enabled }}
# - name: KAFKA_BOOTSTRAP_SERVERS
#   value: {{ .Values.kafka.bootstrapServers | quote }}
# - name: KAFKA_SECURITY_PROTOCOL
#   value: {{ .Values.kafka.securityProtocol | quote }}
# {{- if .Values.kafka.saslMechanism }}
# - name: KAFKA_SASL_MECHANISM
#   value: {{ .Values.kafka.saslMechanism | quote }}
# - name: KAFKA_SASL_USERNAME
#   value: {{ .Values.kafka.username | quote }}
# - name: KAFKA_SASL_PASSWORD
#   {{- if .Values.kafka.existingSecret }}
#   valueFrom:
#     secretKeyRef:
#       name: {{ .Values.kafka.existingSecret }}
#       key: {{ .Values.kafka.existingSecretKey }}
#   {{- else }}
#   value: {{ .Values.kafka.password | quote }}
#   {{- end }}
# {{- end }}
# {{- if .Values.kafka.consumer.groupId }}
# - name: KAFKA_CONSUMER_GROUP_ID
#   value: {{ .Values.kafka.consumer.groupId | quote }}
# {{- end }}
# {{- end }}

# -----------------------------------------------------------------------------
# RABBITMQ - Message Queue
# -----------------------------------------------------------------------------
# Use when application uses RabbitMQ for messaging

rabbitmq:
  # -- Enable RabbitMQ integration
  enabled: false

  # -- RabbitMQ host
  host: ""

  # -- RabbitMQ AMQP port
  port: 5672

  # -- RabbitMQ management port (for health checks)
  managementPort: 15672

  # -- Virtual host
  vhost: "/"

  # -- RabbitMQ username
  username: "guest"

  # -- RabbitMQ password (use existingSecret in production)
  password: ""

  # -- Use existing Kubernetes secret for credentials
  existingSecret: ""

  # -- Key in existing secret containing the password
  existingSecretKey: "password"

  # -- SSL/TLS configuration
  ssl:
    enabled: false
    verify: true
    caCertPath: ""

# RabbitMQ environment variables template:
# {{- if .Values.rabbitmq.enabled }}
# - name: RABBITMQ_HOST
#   value: {{ .Values.rabbitmq.host | quote }}
# - name: RABBITMQ_PORT
#   value: {{ .Values.rabbitmq.port | quote }}
# - name: RABBITMQ_VHOST
#   value: {{ .Values.rabbitmq.vhost | quote }}
# - name: RABBITMQ_USERNAME
#   value: {{ .Values.rabbitmq.username | quote }}
# - name: RABBITMQ_PASSWORD
#   {{- if .Values.rabbitmq.existingSecret }}
#   valueFrom:
#     secretKeyRef:
#       name: {{ .Values.rabbitmq.existingSecret }}
#       key: {{ .Values.rabbitmq.existingSecretKey }}
#   {{- else }}
#   value: {{ .Values.rabbitmq.password | quote }}
#   {{- end }}
# # AMQP URL format (alternative)
# - name: RABBITMQ_URL
#   value: "amqp://{{ .Values.rabbitmq.username }}:$(RABBITMQ_PASSWORD)@{{ .Values.rabbitmq.host }}:{{ .Values.rabbitmq.port }}{{ .Values.rabbitmq.vhost }}"
# {{- end }}

# -----------------------------------------------------------------------------
# REDIS - Cache/Message Broker
# -----------------------------------------------------------------------------
# Use when Redis is used as a message broker (Celery, Bull, etc.)

redis:
  # -- Enable Redis integration (as message broker)
  enabled: false

  # -- Redis host
  host: ""

  # -- Redis port
  port: 6379

  # -- Redis database number
  database: 0

  # -- Redis password (use existingSecret in production)
  password: ""

  # -- Use existing Kubernetes secret for credentials
  existingSecret: ""

  # -- Key in existing secret containing the password
  existingSecretKey: "password"

  # -- Enable TLS
  tls:
    enabled: false

  # -- Sentinel configuration (for HA Redis)
  sentinel:
    enabled: false
    masterName: ""
    nodes: ""  # comma-separated host:port list

# Redis environment variables template:
# {{- if .Values.redis.enabled }}
# - name: REDIS_HOST
#   value: {{ .Values.redis.host | quote }}
# - name: REDIS_PORT
#   value: {{ .Values.redis.port | quote }}
# - name: REDIS_DB
#   value: {{ .Values.redis.database | quote }}
# {{- if or .Values.redis.password .Values.redis.existingSecret }}
# - name: REDIS_PASSWORD
#   {{- if .Values.redis.existingSecret }}
#   valueFrom:
#     secretKeyRef:
#       name: {{ .Values.redis.existingSecret }}
#       key: {{ .Values.redis.existingSecretKey }}
#   {{- else }}
#   value: {{ .Values.redis.password | quote }}
#   {{- end }}
# {{- end }}
# # Redis URL format (alternative)
# - name: REDIS_URL
#   value: "redis{{ if .Values.redis.tls.enabled }}s{{ end }}://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/{{ .Values.redis.database }}"
# {{- end }}

# -----------------------------------------------------------------------------
# COMMON PORTS REFERENCE
# -----------------------------------------------------------------------------
# | Service    | Default Port | Protocol | Notes                    |
# |------------|--------------|----------|--------------------------|
# | Airflow    | 8080         | HTTP     | Webserver/API            |
# | Kafka      | 9092         | TCP      | Plaintext                |
# | Kafka      | 9093         | TCP      | SSL                      |
# | Kafka      | 9094         | TCP      | SASL                     |
# | RabbitMQ   | 5672         | AMQP     | Message protocol         |
# | RabbitMQ   | 15672        | HTTP     | Management UI            |
# | RabbitMQ   | 5671         | AMQPS    | SSL                      |
# | Redis      | 6379         | TCP      | Default                  |
# | Redis      | 26379        | TCP      | Sentinel                 |


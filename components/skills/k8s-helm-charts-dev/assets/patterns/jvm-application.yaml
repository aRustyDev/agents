# -----------------------------------------------------------------------------
# RESOURCE CALCULATION GUIDELINES
# -----------------------------------------------------------------------------
# JVM memory layout:
#   Container Memory = Heap + Metaspace + Thread Stacks + Native Memory + Buffer
#
# Rule of thumb:
#   Container Limit = Heap Size * 1.3 to 1.5
#
# Example for 2GB heap:
#   resources:
#     requests:
#       memory: "2.5Gi"   # Heap + some overhead
#       cpu: "500m"
#     limits:
#       memory: "3Gi"     # Heap * 1.5
#       cpu: "2000m"
#
# For production with GC overhead:
#   resources:
#     requests:
#       memory: "{{ heap_gb * 1.25 }}Gi"
#     limits:
#       memory: "{{ heap_gb * 1.5 }}Gi"

resources:
  requests:
    # Memory should be at least heap size + 25% for metaspace, threads, native
    memory: "2.5Gi"
    cpu: "500m"
  limits:
    # Memory limit should be heap size * 1.5 to avoid OOM kills
    memory: "3Gi"
    cpu: "2000m"

# -----------------------------------------------------------------------------
# COMMON GC CONFIGURATIONS
# -----------------------------------------------------------------------------

# Low latency (API servers, web apps):
# jvm:
#   heapOpts: "-Xmx4G -Xms4G"
#   gc:
#     type: "zgc"
#     opts: "-XX:+ZGenerational"  # Java 21+

# High throughput (batch processing):
# jvm:
#   heapOpts: "-Xmx8G -Xms8G"
#   gc:
#     type: "parallel"
#     opts: "-XX:ParallelGCThreads=4"

# Balanced (general purpose):
# jvm:
#   heapOpts: "-Xmx2G -Xms2G"
#   gc:
#     type: "g1"
#     opts: "-XX:MaxGCPauseMillis=200"

# Memory constrained:
# jvm:
#   heapOpts: "-Xmx512M -Xms512M"
#   gc:
#     type: "serial"
#   opts: "-XX:+UseStringDeduplication"

# -----------------------------------------------------------------------------
# FRAMEWORK-SPECIFIC CONFIGURATIONS
# -----------------------------------------------------------------------------

# Spring Boot:
# jvm:
#   heapOpts: "-Xmx2G -Xms2G"
#   opts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
# env:
#   - name: SPRING_PROFILES_ACTIVE
#     value: "kubernetes,production"
#   - name: MANAGEMENT_SERVER_PORT
#     value: "8081"

# Dropwizard:
# jvm:
#   heapOpts: "-Xmx2G -Xms2G"
#   opts: "-Ddw.server.applicationConnectors[0].port=8080 -Ddw.server.adminConnectors[0].port=8081"

# Micronaut:
# jvm:
#   heapOpts: "-Xmx512M -Xms512M"  # Micronaut is more memory efficient
#   opts: "-Dmicronaut.environments=kubernetes"

# Quarkus (native mode doesn't need these):
# jvm:
#   heapOpts: "-Xmx256M -Xms256M"  # Quarkus JVM mode is efficient
#   opts: "-Dquarkus.profile=prod"


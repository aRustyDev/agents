# -----------------------------------------------------------------------------
# CONTAINER-AWARE JVM OPTIONS (Java 10+)
# -----------------------------------------------------------------------------
# Modern JVMs can detect container limits automatically

# jvm:
#   heapOpts: ""  # Let JVM auto-detect
#   opts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"

# This tells the JVM to:
# - Detect container memory limits
# - Use 75% of available memory for heap
# - Start with 50% of available memory

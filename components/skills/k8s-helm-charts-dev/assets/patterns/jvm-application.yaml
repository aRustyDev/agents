# =============================================================================
# JVM Application Configuration Pattern
# =============================================================================
# Use this pattern for Java, Kotlin, Scala, or other JVM-based applications.
#
# Covers:
# - Heap and memory configuration
# - Garbage collection tuning
# - JMX monitoring
# - Debug configuration
# - Common JVM frameworks (Spring Boot, Dropwizard, Micronaut)
#
# Usage:
#   1. Copy the values section to your values.yaml
#   2. Copy the environment variable section to your deployment.yaml
#   3. Adjust resource requests/limits based on heap settings
# =============================================================================

# -----------------------------------------------------------------------------
# VALUES.YAML SECTION
# -----------------------------------------------------------------------------

jvm:
  # -- JVM heap options
  # Should be ~75% of container memory limit to leave room for metaspace, threads, etc.
  heapOpts: "-Xmx2G -Xms2G"

  # -- Additional JVM options
  # Common options: GC tuning, metaspace, thread stack size
  opts: ""

  # -- Garbage collector selection
  # Options: G1 (default for Java 9+), ZGC, Shenandoah, Parallel, Serial
  gc:
    # -- GC type: g1, zgc, shenandoah, parallel, serial, or custom
    type: "g1"
    # -- Additional GC options (e.g., "-XX:MaxGCPauseMillis=200")
    opts: ""

  # -- JMX remote monitoring configuration
  jmx:
    # -- Enable JMX remote access
    enabled: false
    # -- JMX port
    port: 9010
    # -- Require authentication
    authenticate: false
    # -- Require SSL
    ssl: false
    # -- RMI server hostname (set to pod IP for Kubernetes)
    rmiServerHostname: ""

  # -- Remote debugging configuration
  debug:
    # -- Enable remote debugging
    enabled: false
    # -- Debug port
    port: 5005
    # -- Suspend on start (wait for debugger)
    suspend: false

  # -- Java agent configuration (for APM, profiling, etc.)
  agent:
    # -- Enable Java agent
    enabled: false
    # -- Agent JAR path (can be mounted via ConfigMap or init container)
    path: ""
    # -- Agent options
    opts: ""


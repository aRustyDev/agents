# -----------------------------------------------------------------------------
# COMMON PORT PATTERNS BY APPLICATION TYPE
# -----------------------------------------------------------------------------
# | App Type        | Main    | Admin   | Metrics | Debug   |
# |-----------------|---------|---------|---------|---------|
# | Java/Dropwizard | 8080    | 8081    | 8081    | 5005    |
# | Spring Boot     | 8080    | 8081    | 8081    | 5005    |
# | Go              | 8080    | 8080    | 9090    | 2345    |
# | Node.js         | 3000    | 3000    | 9090    | 9229    |
# | Python/Flask    | 5000    | 5000    | 9090    | 5678    |
# | Python/FastAPI  | 8000    | 8000    | 9090    | 5678    |
# | gRPC            | 9000    | 8080    | 9090    | -       |

# -----------------------------------------------------------------------------
# PROMETHEUS ANNOTATIONS FOR METRICS PORT
# -----------------------------------------------------------------------------

# podAnnotations:
#   prometheus.io/scrape: "true"
#   prometheus.io/port: "{{ .Values.service.metricsPort }}"
#   prometheus.io/path: "/metrics"

# Or in service annotations for ServiceMonitor discovery:
# service:
#   annotations:
#     prometheus.io/scrape: "true"
#     prometheus.io/port: "9090"
#     prometheus.io/path: "/prometheus"

# -----------------------------------------------------------------------------
# EXAMPLE CONFIGURATIONS
# -----------------------------------------------------------------------------

# Java application (Dropwizard style):
# service:
#   type: ClusterIP
#   port: 8080        # Application
#   adminPort: 8081   # Admin + Metrics
#   metricsPort: 8081 # Same as admin (Dropwizard combines them)

# Microservice with gRPC:

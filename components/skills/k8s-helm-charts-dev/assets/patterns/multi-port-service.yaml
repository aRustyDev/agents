# =============================================================================
# Multi-Port Service Configuration Pattern
# =============================================================================
# Use this pattern when application exposes multiple ports for different
# purposes (web UI, admin, metrics, debug, etc.)
#
# Common scenarios:
# - Main HTTP port + Admin/Management port
# - Web UI + API port + Metrics port
# - Application port + Debug/JMX port
#
# Usage:
#   1. Copy the values section to your values.yaml
#   2. Copy the service template to your templates/service.yaml
#   3. Copy the container ports to your templates/deployment.yaml
#   4. Optionally create separate services for different access patterns
# =============================================================================

# -----------------------------------------------------------------------------
# VALUES.YAML SECTION - Option 1: Structured Ports
# -----------------------------------------------------------------------------
# Use when ports have distinct purposes

service:
  # -- Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP

  # -- Main web/API port
  port: 8080

  # -- Admin/management port (health checks, configuration)
  adminPort: 8081

  # -- Metrics port (Prometheus scraping)
  metricsPort: 9090

  # -- Debug port (optional, usually disabled in production)
  debugPort: null  # Set to port number to enable

  # -- Service annotations
  annotations: {}

  # -- Session affinity (None or ClientIP)
  sessionAffinity: None

# -----------------------------------------------------------------------------
# VALUES.YAML SECTION - Option 2: Flexible Port List
# -----------------------------------------------------------------------------
# Use when number/types of ports vary between deployments

# service:
#   type: ClusterIP
#   ports:
#     - name: http
#       port: 8080
#       targetPort: http
#       protocol: TCP
#     - name: admin
#       port: 8081
#       targetPort: admin
#       protocol: TCP
#     - name: metrics
#       port: 9090
#       targetPort: metrics
#       protocol: TCP
#     - name: grpc
#       port: 9000
#       targetPort: grpc
#       protocol: TCP


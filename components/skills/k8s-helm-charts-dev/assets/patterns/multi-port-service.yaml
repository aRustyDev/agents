# -----------------------------------------------------------------------------
# SEPARATE SERVICES PATTERN
# -----------------------------------------------------------------------------
# Use when different ports need different service types or access patterns
# Example: Main service is LoadBalancer, metrics is ClusterIP for internal scraping

# values.yaml:
# services:
#   main:
#     type: LoadBalancer
#     port: 8080
#     annotations:
#       service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
#   admin:
#     type: ClusterIP
#     port: 8081
#   metrics:
#     type: ClusterIP
#     port: 9090
#     annotations:
#       prometheus.io/scrape: "true"

# templates/service-main.yaml:
# apiVersion: v1
# kind: Service
# metadata:
#   name: {{ include "<chart>.fullname" . }}
#   ...
# spec:
#   type: {{ .Values.services.main.type }}
#   ports:
#     - port: {{ .Values.services.main.port }}
#       targetPort: http
#       name: http
#   selector:
#     {{- include "<chart>.selectorLabels" . | nindent 4 }}


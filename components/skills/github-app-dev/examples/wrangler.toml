# Cloudflare Workers configuration for GitHub App

name = "github-app-example"
main = "cloudflare-workers-minimal.ts"
compatibility_date = "2024-01-01"

# Public variables (non-sensitive)
[vars]
GITHUB_APP_ID = "" # Fill in your App ID

# Secrets (set via `wrangler secret put`)
# GITHUB_PRIVATE_KEY - Your app's private key
# GITHUB_WEBHOOK_SECRET - Webhook secret for signature verification

# Development settings
[env.dev]
name = "github-app-example-dev"

# Production settings
[env.production]
name = "github-app-example"

# Custom domains (optional)
# routes = [
#   { pattern = "github-app.example.com/*", zone_name = "example.com" }
# ]
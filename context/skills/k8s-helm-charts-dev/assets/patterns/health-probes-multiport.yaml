# =============================================================================
# Health Probes Pattern for Multi-Port Applications
# =============================================================================
# Use this pattern when application has separate ports for different purposes
# and requires careful probe configuration.
#
# Key concepts:
# - Liveness: Is the process alive? Should Kubernetes restart it?
# - Readiness: Can the application handle traffic?
# - Startup: Is the application still starting up?
#
# Best practice: Use admin/management port for liveness, main port for readiness
#
# Usage:
#   1. Copy the values section to your values.yaml
#   2. Copy the probe configuration to your deployment.yaml
#   3. Adjust timeouts based on application characteristics
# =============================================================================

# -----------------------------------------------------------------------------
# VALUES.YAML SECTION
# -----------------------------------------------------------------------------

# -- Liveness probe configuration
# Use admin port - checks if process is healthy, not if app logic works
livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Probe type: httpGet, tcpSocket, exec
  type: httpGet
  # -- HTTP path for httpGet probe
  path: /healthcheck
  # -- Port name or number (use admin port)
  port: admin
  # -- HTTP scheme: HTTP or HTTPS
  scheme: HTTP
  # -- Initial delay before first probe (allow startup)
  initialDelaySeconds: 60
  # -- How often to perform the probe
  periodSeconds: 30
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Minimum consecutive successes
  successThreshold: 1
  # -- Minimum consecutive failures before restart
  failureThreshold: 5

# -- Readiness probe configuration
# Use main port - checks if app can handle traffic
readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Probe type: httpGet, tcpSocket, exec
  type: httpGet
  # -- HTTP path for httpGet probe
  path: /
  # -- Port name or number (use main http port)
  port: http
  # -- HTTP scheme: HTTP or HTTPS
  scheme: HTTP
  # -- Initial delay before first probe
  initialDelaySeconds: 30
  # -- How often to perform the probe
  periodSeconds: 10
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Minimum consecutive successes
  successThreshold: 1
  # -- Minimum consecutive failures before marking unready
  failureThreshold: 3

# -- Startup probe configuration
# Use for slow-starting applications to avoid liveness probe killing during startup
startupProbe:
  # -- Enable startup probe
  enabled: false
  # -- Probe type: httpGet, tcpSocket, exec
  type: httpGet
  # -- HTTP path for httpGet probe
  path: /healthcheck
  # -- Port name or number
  port: admin
  # -- HTTP scheme: HTTP or HTTPS
  scheme: HTTP
  # -- Initial delay before first probe
  initialDelaySeconds: 10
  # -- How often to perform the probe
  periodSeconds: 10
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Minimum consecutive failures (total startup time = period * failures)
  failureThreshold: 30  # 30 * 10s = 5 minutes max startup


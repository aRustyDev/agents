# -----------------------------------------------------------------------------
# COMMON HEALTH ENDPOINTS BY FRAMEWORK
# -----------------------------------------------------------------------------
#
# | Framework      | Liveness                    | Readiness                   | Port       |
# |----------------|-----------------------------|-----------------------------|------------|
# | Spring Boot    | /actuator/health/liveness   | /actuator/health/readiness  | management |
# | Dropwizard     | /healthcheck                | /                           | admin      |
# | Micronaut      | /health/liveness            | /health/readiness           | main       |
# | Quarkus        | /q/health/live              | /q/health/ready             | main       |
# | Express.js     | /health                     | /ready                      | main       |
# | FastAPI        | /health                     | /                           | main       |
# | Go stdlib      | /healthz                    | /readyz                     | main       |
# | ASP.NET Core   | /health/live                | /health/ready               | main       |
# | gRPC           | grpc.health.v1.Health/Check | (same)                      | grpc       |

# -----------------------------------------------------------------------------
# PROBE STRATEGIES BY SCENARIO
# -----------------------------------------------------------------------------

# Strategy 1: Simple Application (single port, fast startup)
# - Use same endpoint for both probes
# - Short initial delays
#
# livenessProbe:
#   path: /health
#   port: http
#   initialDelaySeconds: 10
#   periodSeconds: 10
#   failureThreshold: 3
# readinessProbe:
#   path: /health
#   port: http
#   initialDelaySeconds: 5
#   periodSeconds: 5
#   failureThreshold: 3

# Strategy 2: Java/JVM Application (slow startup)
# - Use startup probe to allow long initialization
# - Separate admin port for infrastructure health
#
# startupProbe:
#   enabled: true
#   path: /healthcheck
#   port: admin
#   initialDelaySeconds: 10
#   periodSeconds: 10
#   failureThreshold: 60  # 10 minutes max startup
# livenessProbe:
#   path: /healthcheck
#   port: admin
#   initialDelaySeconds: 0  # Startup probe handles initial delay
#   periodSeconds: 30
#   failureThreshold: 5
# readinessProbe:
#   path: /
#   port: http
#   initialDelaySeconds: 0
#   periodSeconds: 10
#   failureThreshold: 3

# Strategy 3: Database-Dependent Application
# - Liveness: Process alive (don't check DB)
# - Readiness: Full health including DB connection
#
# livenessProbe:
#   path: /health/liveness  # Only checks process
#   port: admin
#   periodSeconds: 30
#   failureThreshold: 5
# readinessProbe:
#   path: /health/readiness  # Checks DB, cache, etc.
#   port: admin
#   periodSeconds: 10
#   failureThreshold: 3
#   # Note: Don't kill pod if DB is temporarily unavailable
#   # Readiness will remove from service, liveness should not restart

# Strategy 4: gRPC Application
# - Use gRPC health checking protocol
#
# livenessProbe:
#   type: exec
#   command:
#     - /bin/grpc_health_probe
#     - -addr=:9000
#   periodSeconds: 30
#   failureThreshold: 5
# readinessProbe:
#   type: exec
#   command:
#     - /bin/grpc_health_probe
#     - -addr=:9000
#   periodSeconds: 10
#   failureThreshold: 3

# Strategy 5: TCP-Only (no HTTP endpoints)
# - Use tcpSocket probe
#
# livenessProbe:
#   type: tcpSocket
#   port: 5432
#   periodSeconds: 30
#   failureThreshold: 5
# readinessProbe:
#   type: tcpSocket
#   port: 5432
#   periodSeconds: 10
#   failureThreshold: 3

# -----------------------------------------------------------------------------
# ANTI-PATTERNS TO AVOID
# -----------------------------------------------------------------------------

# BAD: Same probe for liveness and readiness when they mean different things
# livenessProbe:
#   path: /health  # Checks DB connection
# readinessProbe:
#   path: /health  # Same path
# PROBLEM: If DB is down, pod gets killed instead of just removed from service

# BAD: Too aggressive liveness probe
# livenessProbe:
#   initialDelaySeconds: 5
#   periodSeconds: 5
#   failureThreshold: 1  # One failure = restart!
# PROBLEM: Transient issues cause cascading restarts

# BAD: Liveness probe that depends on external services
# livenessProbe:
#   path: /health  # Checks DB, cache, external APIs
# PROBLEM: External service down = all pods restart

# BAD: No startup probe for slow-starting apps
# livenessProbe:
#   initialDelaySeconds: 30  # Too short for JVM warmup
#   failureThreshold: 3
# PROBLEM: Pod keeps restarting during legitimate startup


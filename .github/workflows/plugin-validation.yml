---
name: Plugin Validation

on:
  push:
    branches: [main]
    paths:
      - 'context/plugins/**'
      - 'context/skills/**'
      - 'context/commands/**'
      - 'context/agents/**'
      - '.scripts/build-plugin.py'
      - '.scripts/plugin-hash.py'
  pull_request:
    branches: [main]
    paths:
      - 'context/plugins/**'
      - 'context/skills/**'
      - 'context/commands/**'
      - 'context/agents/**'
      - '.scripts/build-plugin.py'
      - '.scripts/plugin-hash.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync --quiet

      - name: Validate all plugins
        run: uv run python .scripts/build-plugin.py check-all

      - name: Build all plugins (check-only)
        run: uv run python .scripts/build-plugin.py build-all --check-only

# Pre-commit configuration
# Install: pre-commit install
# Run all: pre-commit run --all-files
# Update: pre-commit autoupdate

# Fail fast on first error
fail_fast: false

# Default stages
default_stages: [pre-commit]

repos:
  # =============================================================================
  # File Size Detection (Prevent LFS)
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: "file-size: prevent large files"
        args: ['--maxkb=50000']  # 50MB limit (GitHub max is 100MB)

  # =============================================================================
  # Markdown Linting (rumdl)
  # =============================================================================
  - repo: local
    hooks:
      - id: rumdl-check
        name: "markdown: rumdl check"
        entry: rumdl check
        language: system
        types: [markdown]

      - id: rumdl-fix
        name: "markdown: rumdl fix"
        entry: rumdl fmt
        language: system
        types: [markdown]
        stages: [manual]

  # =============================================================================
  # Link Checking (lychee)
  # =============================================================================
  - repo: local
    hooks:
      - id: lychee
        name: "links: lychee check"
        entry: lychee
        language: system
        types: [markdown]
        args:
          - '--no-progress'
          - '--cache'
          - '--max-cache-age=1d'
          - '--exclude=mailto:'
          - '--exclude=localhost'
          - '--exclude=127.0.0.1'
          - '--exclude=^#'
        verbose: true

  # =============================================================================
  # JSON Linting
  # =============================================================================
  - repo: local
    hooks:
      - id: json-validate
        name: "json: validate syntax"
        entry: bash -c 'for f in "$@"; do python3 -c "import json; json.load(open(\"$f\"))" || exit 1; done'
        language: system
        types: [json]

  # =============================================================================
  # YAML Linting
  # =============================================================================
  - repo: local
    hooks:
      - id: yamllint
        name: "yaml: yamllint validate"
        entry: yamllint
        language: system
        types: [yaml]
        args:
          - '-d'
          - '{extends: default, rules: {line-length: {max: 120}, truthy: disable}}'

  # =============================================================================
  # Spell Checking (cspell)
  # =============================================================================
  - repo: local
    hooks:
      - id: cspell
        name: "spelling: cspell check"
        entry: cspell lint
        language: system
        types: [text]
        args:
          - '--no-progress'
          - '--no-summary'
          - '--config=.github/pre-commit/cspell.json'
        exclude: |
          (?x)^(
            .*\.sql$|
            .*\.lock$|
            .*\.min\..*|
            package-lock\.json$|
            uv\.lock$
          )$

  # =============================================================================
  # Claude Context Linting (cclint)
  # =============================================================================
  - repo: local
    hooks:
      - id: cclint
        name: "cclint: validate claude context files"
        entry: bash -c 'scripts/lint-context.sh'
        language: system
        files: |
          (?x)^(
            context/.*\.md|
            \.claude/.*\.md|
            CLAUDE\.md
          )$
        pass_filenames: false

  # =============================================================================
  # SQL Linting (sqlfluff)
  # =============================================================================
  - repo: local
    hooks:
      - id: sqlfluff-lint
        name: "sql: sqlfluff lint"
        entry: sqlfluff lint
        language: system
        types: [sql]
        args:
          - '--dialect=sqlite'

      - id: sqlfluff-fix
        name: "sql: sqlfluff fix"
        entry: sqlfluff fix
        language: system
        types: [sql]
        args:
          - '--dialect=sqlite'
          - '--force'
        stages: [manual]

  # =============================================================================
  # Bash Linting (shellcheck)
  # =============================================================================
  - repo: local
    hooks:
      - id: shellcheck
        name: "bash: shellcheck lint"
        entry: shellcheck
        language: system
        types: [shell]
        args:
          - '--severity=warning'
          - '--shell=bash'

  # =============================================================================
  # Bash Formatting (shfmt)
  # =============================================================================
  - repo: local
    hooks:
      - id: shfmt-check
        name: "bash: shfmt check"
        entry: shfmt
        language: system
        types: [shell]
        args:
          - '-d'   # Diff mode (check only)
          - '-i=2' # 2 space indent
          - '-ci'  # Indent switch cases

      - id: shfmt-fix
        name: "bash: shfmt fix"
        entry: shfmt
        language: system
        types: [shell]
        args:
          - '-w'   # Write in place
          - '-i=2'
          - '-ci'
        stages: [manual]

  # =============================================================================
  # Bash Security (shellharden)
  # =============================================================================
  - repo: local
    hooks:
      - id: shellharden
        name: "bash: shellharden check"
        entry: shellharden
        language: system
        types: [shell]
        args:
          - '--check'

  # =============================================================================
  # Brewfile Linting
  # =============================================================================
  - repo: local
    hooks:
      - id: brewfile-lint
        name: "brewfile: syntax check"
        entry: bash -c 'ruby -c brewfile >/dev/null'
        language: system
        files: '^brewfile$'
        pass_filenames: false

  # =============================================================================
  # Justfile Linting
  # =============================================================================
  - repo: local
    hooks:
      - id: justfile-check
        name: "justfile: syntax check"
        entry: just --fmt --check --unstable
        language: system
        files: '^justfile$'
        pass_filenames: false

      - id: justfile-format
        name: "justfile: format"
        entry: just --fmt --unstable
        language: system
        files: '^justfile$'
        pass_filenames: false
        stages: [manual]

  # =============================================================================
  # Python Linting (ruff)
  # =============================================================================
  - repo: local
    hooks:
      - id: ruff-check
        name: "python: ruff check"
        entry: ruff check
        language: system
        types: [python]
        args:
          - '--fix'
          - '--exit-non-zero-on-fix'

      - id: ruff-format-check
        name: "python: ruff format check"
        entry: ruff format
        language: system
        types: [python]
        args:
          - '--check'

      - id: ruff-format-fix
        name: "python: ruff format fix"
        entry: ruff format
        language: system
        types: [python]
        stages: [manual]

  # =============================================================================
  # JavaScript/TypeScript Linting (biome)
  # =============================================================================
  - repo: local
    hooks:
      - id: biome-check
        name: "js/ts: biome check"
        entry: biome check
        language: system
        files: '\.(js|jsx|ts|tsx|mjs|cjs)$'
        exclude: |
          (?x)^(
            node_modules/|
            dist/|
            build/|
            .*\.min\..*|
            context/\.context/legacy/.*|
            context/skills/.*/examples/.*
          )$

      - id: biome-fix
        name: "js/ts: biome fix"
        entry: biome check --write
        language: system
        files: '\.(js|jsx|ts|tsx|mjs|cjs)$'
        exclude: |
          (?x)^(
            node_modules/|
            dist/|
            build/|
            .*\.min\..*|
            context/\.context/legacy/.*|
            context/skills/.*/examples/.*
          )$
        stages: [manual]

  # =============================================================================
  # General Checks
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: "whitespace: trailing"
        exclude: '\.md$'

      - id: end-of-file-fixer
        name: "whitespace: end-of-file"

      - id: check-merge-conflict
        name: "git: check merge conflicts"

      - id: check-case-conflict
        name: "git: check case conflicts"

      - id: detect-private-key
        name: "security: detect private keys"
        exclude: |
          (?x)^(
            context/\.context/legacy/.*|
            context/skills/.*/references/.*|
            context/skills/.*/examples/.*
          )$

      - id: check-symlinks
        name: "filesystem: check symlinks"

      - id: check-executables-have-shebangs
        name: "bash: check shebangs"
        exclude: 'context/\.context/legacy/.*'

      - id: check-json
        name: "json: check syntax"
        exclude: |
          (?x)^(
            context/plugins/.*/\..*\.json$|
            context/plugins/.*/hooks/hooks\.json$|
            context/\.context/.*|
            \.zed/.*
          )$

      - id: check-yaml
        name: "yaml: check syntax"
        args: ['--unsafe']  # Allow custom tags
        exclude: 'context/\.context/legacy/.*'

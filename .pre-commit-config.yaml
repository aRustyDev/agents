# Pre-commit configuration
# Install: pre-commit install
# Run all: pre-commit run --all-files
# Update: pre-commit autoupdate
#
# Config files: .github/pre-commit/
# Cache directories: .data/cache/

# Fail fast on first error
fail_fast: false

# Default stages
default_stages: [pre-commit]

repos:
  # =============================================================================
  # General Checks (pre-commit/pre-commit-hooks)
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: "file-size: prevent large files"
        args: ['--maxkb=50000']  # 50MB limit (GitHub max is 100MB)

      - id: trailing-whitespace
        name: "whitespace: trailing"
        exclude: '\.md$'

      - id: end-of-file-fixer
        name: "whitespace: end-of-file"

      - id: check-merge-conflict
        name: "git: check merge conflicts"

      - id: check-case-conflict
        name: "git: check case conflicts"

      - id: detect-private-key
        name: "security: detect private keys"
        exclude: |
          (?x)^(
            context/\.context/legacy/.*|
            context/skills/.*/references/.*|
            context/skills/.*/examples/.*
          )$

      - id: check-symlinks
        name: "filesystem: check symlinks"

      - id: check-executables-have-shebangs
        name: "bash: check shebangs"
        exclude: 'context/\.context/legacy/.*'

      - id: check-json
        name: "json: check syntax"
        exclude: |
          (?x)^(
            context/plugins/.*/\..*\.json$|
            context/plugins/.*/hooks/hooks\.json$|
            context/\.context/.*|
            \.zed/.*
          )$

      - id: check-yaml
        name: "yaml: check syntax"
        args: ['--unsafe']  # Allow custom tags
        exclude: 'context/\.context/legacy/.*'

  # =============================================================================
  # Markdown Linting (rumdl)
  # =============================================================================
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.11
    hooks:
      - id: rumdl
        name: "markdown: rumdl check"
        args:
          - '--config=.github/pre-commit/rumdl.toml'
        exclude: |
          (?x)^(
            context/\.context/.*|
            context/skills/.*/examples/.*|
            context/skills/.*/references/.*
          )$

  # =============================================================================
  # Link Checking (lychee)
  # =============================================================================
  - repo: https://github.com/lycheeverse/lychee
    rev: lychee-v0.18.0
    hooks:
      - id: lychee
        name: "links: lychee check"
        args:
          - '--no-progress'
          - '--cache'
          - '--max-cache-age=1d'
          - '--exclude=mailto:'
          - '--exclude=localhost'
          - '--exclude=127.0.0.1'
          - '--exclude=^#'
        types: [markdown]
        exclude: |
          (?x)^(
            context/\.context/.*|
            context/skills/.*/examples/.*|
            context/skills/.*/references/.*
          )$

  # =============================================================================
  # YAML Linting (yamllint)
  # =============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: "yaml: yamllint validate"
        args:
          - '--config-file=.github/pre-commit/yamllint.yaml'

  # =============================================================================
  # JSON Linting - Local (explicit validation beyond check-json)
  # =============================================================================
  - repo: local
    hooks:
      - id: json-validate
        name: "json: validate syntax"
        entry: bash -c 'for f in "$@"; do python3 -c "import json; json.load(open(\"$f\"))" || exit 1; done'
        language: system
        types: [json]

  # =============================================================================
  # Spell Checking (cspell) - Local, uses config with multiple dictionaries
  # =============================================================================
  - repo: local
    hooks:
      - id: cspell
        name: "spelling: cspell check"
        entry: cspell lint --config .github/pre-commit/cspell.json --no-progress --no-summary
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.sql$|
            .*\.lock$|
            .*\.tex$|
            .*\.min\..*|
            package-lock\.json$|
            uv\.lock$|
            context/\.context/.*|
            context/skills/.*/examples/.*|
            context/skills/.*/references/.*|
            context/skills/.*/assets/.*|
            context/skills/convert-.*|
            context/skills/analysis\.md$|
            context/rules/schemas\.md$|
            settings/mcp/.*|
            settings/claude/.*|
            context/skills/pkgmgr-homebrew-formula-dev/.*|
            context/skills/external\.yaml$|
            assets/templates/.*|
            context/plugins/homebrew-dev/skills/.*
          )$

  # =============================================================================
  # Claude Context Linting (cclint) - Local, requires scripts/lint-context.sh
  # =============================================================================
  - repo: local
    hooks:
      - id: cclint
        name: "cclint: validate claude context files"
        entry: bash -c 'scripts/lint-context.sh'
        language: system
        files: |
          (?x)^(
            context/.*\.md|
            \.claude/.*\.md|
            CLAUDE\.md
          )$
        pass_filenames: false

  # =============================================================================
  # SQL Linting (sqlfluff)
  # =============================================================================
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.0.0
    hooks:
      - id: sqlfluff-lint
        name: "sql: sqlfluff lint"
        args:
          - '--config=.github/pre-commit/sqlfluff.cfg'

      - id: sqlfluff-fix
        name: "sql: sqlfluff fix"
        args:
          - '--config=.github/pre-commit/sqlfluff.cfg'
          - '--force'
        stages: [manual]

  # =============================================================================
  # Bash Linting (shellcheck)
  # =============================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: "bash: shellcheck lint"
        args:
          - '--severity=warning'
          - '--shell=bash'

  # =============================================================================
  # Bash Formatting (shfmt)
  # =============================================================================
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        name: "bash: shfmt check"
        args:
          - '-d'   # Diff mode (check only)
          - '-i=2' # 2 space indent
          - '-ci'  # Indent switch cases

      - id: shfmt
        name: "bash: shfmt fix"
        args:
          - '-w'   # Write in place
          - '-i=2'
          - '-ci'
        stages: [manual]

  # =============================================================================
  # Bash Security (shellharden)
  # =============================================================================
  - repo: https://github.com/aRustyDev/shellharden
    rev: v0.1.0
    hooks:
      - id: shellharden
        name: "bash: shellharden check"

  # =============================================================================
  # Brewfile Linting - Local, project-specific
  # =============================================================================
  - repo: local
    hooks:
      - id: brewfile-lint
        name: "brewfile: syntax check"
        entry: bash -c 'ruby -c brewfile >/dev/null'
        language: system
        files: '^brewfile$'
        pass_filenames: false

  # =============================================================================
  # Justfile Linting - Local, project-specific
  # =============================================================================
  - repo: local
    hooks:
      - id: justfile-check
        name: "justfile: syntax check"
        entry: just --fmt --check --unstable
        language: system
        files: '^justfile$'
        pass_filenames: false

      - id: justfile-format
        name: "justfile: format"
        entry: just --fmt --unstable
        language: system
        files: '^justfile$'
        pass_filenames: false
        stages: [manual]

  # =============================================================================
  # Python Linting (ruff)
  # =============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        name: "python: ruff check"
        args:
          - '--config=.github/pre-commit/ruff.toml'
          - '--fix'
          - '--exit-non-zero-on-fix'

      - id: ruff-format
        name: "python: ruff format check"
        args:
          - '--config=.github/pre-commit/ruff.toml'
          - '--check'

      - id: ruff-format
        name: "python: ruff format fix"
        args:
          - '--config=.github/pre-commit/ruff.toml'
        stages: [manual]

  # =============================================================================
  # JavaScript/TypeScript Linting (biome)
  # =============================================================================
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
      - id: biome-check
        name: "js/ts: biome check"
        additional_dependencies: ['@biomejs/biome@2.0.0']
        args:
          - '--config-path=.github/pre-commit/biome.json'
        exclude: |
          (?x)^(
            node_modules/|
            dist/|
            build/|
            .*\.min\..*|
            context/\.context/.*|
            context/skills/.*/examples/.*|
            context/skills/.*/references/.*
          )$

      - id: biome-format
        name: "js/ts: biome format"
        additional_dependencies: ['@biomejs/biome@2.0.0']
        args:
          - '--config-path=.github/pre-commit/biome.json'
          - '--write'
        exclude: |
          (?x)^(
            node_modules/|
            dist/|
            build/|
            .*\.min\..*|
            context/\.context/.*|
            context/skills/.*/examples/.*|
            context/skills/.*/references/.*
          )$
        stages: [manual]

name: analyzer
description: Deep analysis of skill gaps and improvement suggestions
model: dynamic  # Set by orchestrator based on complexity

allowed_tools:
  - Read
  - Glob
  - Grep
  - WebSearch
  - WebFetch

included_skills:
  - meta-convert-dev
  - meta-convert-guide

max_input_tokens: 80000
max_output_tokens: 15000

output_format: json
output_schema:
  type: object
  properties:
    summary:
      type: string
    gaps:
      type: array
      items:
        type: object
        properties:
          pillar:
            type: string
          severity:
            type: string
            enum: [critical, major, minor]
          description:
            type: string
          suggested_content:
            type: string
    improvements:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
            enum: [add_section, expand_section, add_reference, fix_structure, add_example]
          location:
            type: string
          description:
            type: string
          content_outline:
            type: string
          estimated_lines:
            type: integer
    references_needed:
      type: array
      items:
        type: object
        properties:
          path:
            type: string
          purpose:
            type: string
          content_outline:
            type: string
    total_estimated_additions:
      type: integer
  required: [summary, gaps, improvements]

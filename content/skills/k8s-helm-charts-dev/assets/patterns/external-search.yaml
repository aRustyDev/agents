# =============================================================================
# External Search Configuration Pattern
# =============================================================================
# Use this pattern when chart connects to an EXISTING external search service
# rather than deploying Elasticsearch as a subchart dependency.
#
# Supports: Elasticsearch, OpenSearch
#
# Usage:
#   1. Copy the values section to your values.yaml
#   2. Copy the environment variable section to your deployment.yaml
#   3. Optionally copy helper templates to your _helpers.tpl
# =============================================================================

# -----------------------------------------------------------------------------
# VALUES.YAML SECTION
# -----------------------------------------------------------------------------
# Copy this to your values.yaml under an 'elasticsearch:' key

elasticsearch:
  # -- Enable Elasticsearch/OpenSearch integration
  enabled: true

  # -- Search engine type: elasticsearch or opensearch
  # (Most applications are compatible with both)
  type: elasticsearch

  # -- Elasticsearch host (required if enabled)
  host: ""

  # -- Elasticsearch port
  port: 9200

  # -- Connection scheme: http or https
  scheme: "http"

  # -- Elasticsearch username (if authentication enabled)
  username: ""

  # -- Elasticsearch password (use existingSecret in production)
  password: ""

  # -- Use existing Kubernetes secret for credentials
  existingSecret: ""

  # -- Key in existing secret containing the password
  existingSecretKey: "password"

  # -- Connection timeout in seconds
  connectionTimeout: 5

  # -- Socket timeout in seconds
  socketTimeout: 60

  # -- Keep-alive timeout in seconds
  keepAliveTimeout: 30

  # -- Index prefix for multi-tenant deployments
  indexPrefix: ""

  # -- SSL/TLS configuration
  tls:
    # -- Enable SSL/TLS verification
    enabled: false
    # -- Path to trust store (JKS or PKCS12)
    trustStorePath: ""
    # -- Trust store password
    trustStorePassword: ""
    # -- Skip certificate verification (not recommended for production)
    insecureSkipVerify: false

  # -- Cluster settings
  cluster:
    # -- Number of shards for new indices
    numberOfShards: 1
    # -- Number of replicas for new indices
    numberOfReplicas: 1

# -----------------------------------------------------------------------------
# HELPERS.TPL SECTION
# -----------------------------------------------------------------------------
# Copy these helper templates to your templates/_helpers.tpl

# {{/*
# Elasticsearch URL
# */}}
# {{- define "<chart>.elasticsearchUrl" -}}
# {{- printf "%s://%s:%d" .Values.elasticsearch.scheme .Values.elasticsearch.host (int .Values.elasticsearch.port) }}
# {{- end }}

# {{/*
# Elasticsearch URL with credentials (for clients that need full URL)
# Warning: Use with caution - contains credentials
# */}}
# {{- define "<chart>.elasticsearchUrlWithAuth" -}}
# {{- if and .Values.elasticsearch.username .Values.elasticsearch.password }}
# {{- printf "%s://%s:%s@%s:%d" .Values.elasticsearch.scheme .Values.elasticsearch.username .Values.elasticsearch.password .Values.elasticsearch.host (int .Values.elasticsearch.port) }}
# {{- else }}
# {{- include "<chart>.elasticsearchUrl" . }}
# {{- end }}
# {{- end }}


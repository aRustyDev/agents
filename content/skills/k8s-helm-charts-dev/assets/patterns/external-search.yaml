# -----------------------------------------------------------------------------
# ALTERNATIVE: OPENSEARCH-SPECIFIC CONFIGURATION
# -----------------------------------------------------------------------------
# OpenSearch uses slightly different env var names in some clients

# env:
#   {{- if and .Values.elasticsearch.enabled (eq .Values.elasticsearch.type "opensearch") }}
#   - name: OPENSEARCH_HOST
#     value: {{ .Values.elasticsearch.host | quote }}
#   - name: OPENSEARCH_PORT
#     value: {{ .Values.elasticsearch.port | quote }}
#   - name: OPENSEARCH_SCHEME
#     value: {{ .Values.elasticsearch.scheme | quote }}
#   {{- if .Values.elasticsearch.username }}
#   - name: OPENSEARCH_USER
#     value: {{ .Values.elasticsearch.username | quote }}
#   {{- end }}
#   {{- end }}

# -----------------------------------------------------------------------------
# NOTES.TXT SECTION
# -----------------------------------------------------------------------------
# Add search connection info to NOTES.txt

# {{- if .Values.elasticsearch.enabled }}
# Search Configuration:
#   Type: {{ .Values.elasticsearch.type }}
#   URL: {{ include "<chart>.elasticsearchUrl" . }}
#   {{- if .Values.elasticsearch.username }}
#   User: {{ .Values.elasticsearch.username }}
#   {{- end }}
#   {{- if .Values.elasticsearch.tls.enabled }}
#   TLS: Enabled
#   {{- end }}
#
# Health check: curl {{ include "<chart>.elasticsearchUrl" . }}/_cluster/health
# {{- else }}
# Search: Disabled
# {{- end }}

# -----------------------------------------------------------------------------
# COMMON PORTS REFERENCE
# -----------------------------------------------------------------------------
# | Service      | HTTP Port | Transport Port |
# |--------------|-----------|----------------|
# | Elasticsearch| 9200      | 9300           |
# | OpenSearch   | 9200      | 9300           |
# | Solr         | 8983      | -              |
# | Meilisearch  | 7700      | -              |

# -----------------------------------------------------------------------------
# HEALTH CHECK ENDPOINTS
# -----------------------------------------------------------------------------
# | Service       | Endpoint           | Expected Response |
# |---------------|--------------------|--------------------|
# | Elasticsearch | /_cluster/health   | {"status": "green/yellow/red"} |
# | OpenSearch    | /_cluster/health   | {"status": "green/yellow/red"} |
# | Solr          | /solr/admin/ping   | {"status": "OK"} |

# -----------------------------------------------------------------------------
# EXAMPLE VALUES FOR DIFFERENT SCENARIOS
# -----------------------------------------------------------------------------

# Elasticsearch in same cluster (no auth):
# elasticsearch:
#   enabled: true
#   type: elasticsearch
#   host: elasticsearch-master.elastic.svc.cluster.local
#   port: 9200
#   scheme: http

# Elasticsearch with authentication:
# elasticsearch:
#   enabled: true
#   type: elasticsearch
#   host: elasticsearch-master.elastic.svc.cluster.local
#   port: 9200
#   scheme: https
#   username: elastic
#   existingSecret: elasticsearch-credentials
#   existingSecretKey: password
#   tls:
#     enabled: true

# AWS OpenSearch:
# elasticsearch:
#   enabled: true
#   type: opensearch
#   host: search-myapp-xxxxx.us-east-1.es.amazonaws.com
#   port: 443
#   scheme: https
#   username: admin
#   existingSecret: opensearch-credentials
#   tls:
#     enabled: true

# Elastic Cloud:
# elasticsearch:
#   enabled: true
#   type: elasticsearch
#   host: my-deployment.es.us-east-1.aws.elastic.cloud
#   port: 443
#   scheme: https
#   username: elastic
#   existingSecret: elastic-cloud-credentials
#   tls:
#     enabled: true

# Multi-tenant with index prefix:
# elasticsearch:
#   enabled: true
#   host: elasticsearch.example.com
#   port: 9200
#   scheme: https
#   indexPrefix: "tenant-a-"
#   username: tenant-a
#   existingSecret: tenant-a-es-credentials

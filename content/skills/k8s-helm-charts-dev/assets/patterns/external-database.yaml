# {{- "org.hibernate.dialect.MariaDB103Dialect" }}
# {{- else if eq .Values.database.type "postgres" }}
# {{- "org.hibernate.dialect.PostgreSQL10Dialect" }}
# {{- end }}
# {{- end }}


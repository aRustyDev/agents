    tool: scale_matrix
    desc: Scales a matrix of the provided name by a certain factor, in-place by default.
  - name: null
    tool: matrix_inverse
    desc: Computes the inverse of the matrix with the provided name.
  - name: null
    tool: transpose
    desc: Computes the transpose of the inverse of the matrix of the provided name.
  - name: null
    tool: determinant
    desc: Computes the determinant of the matrix of the provided name.
  - name: null
    tool: rank
    desc: Computes the rank (number of pivots) of the matrix of the provided name.
  - name: null
    tool: compute_eigen
    desc: Calculates the eigenvectors and eigenvalues of the matrix of the provided name.
  - name: null
    tool: qr_decompose
    desc: Computes the QR factorization of the matrix of the provided name. The columns of Q are an orthonormal basis for the image of the matrix, and R is upper triangular.
  - name: null
    tool: svd_decompose
    desc: Computes the Singular Value Decomposition of the matrix of the provided name.
  - name: null
    tool: find_orthonormal_basis
    desc: Finds an orthonormal basis for the matrix of the provided name. The vectors returned are all pair-wise orthogonal and are of unit length.
  - name: null
    tool: change_basis
    desc: Computes the matrix of the provided name in the new basis.
  - name: null
    tool: vector_project
    desc: Projects a vector in the tensor store to the specified vector in the same vector space
  - name: null
    tool: vector_dot_product
    desc: Computes the dot product of two vectors in the tensor stores based on their provided names.
  - name: null
    tool: vector_cross_product
    desc: Computes the cross product of two vectors in the tensor stores based on their provided names.
  - name: null
    tool: gradient
    desc: 'Computes the gradient of a multivariable function based on the input function. Example call: gradient("x^2 + 2xyz + zy^3"). Do NOT include the function name (like f(x, y, z) = ...`).'
  - name: null
    tool: curl
    desc: 'Computes the curl of a vector field based on the input vector field. The input string must be formatted as a python list. Example call: curl("[3xy, 2z^4, 2y]").'
  - name: null
    tool: divergence
    desc: 'Computes the divergence of a vector field based on the input vector field. The input string must be formatted as a python list. Example call: divergence("[3xy, 2z^4, 2y]").'
  - name: null
    tool: divergence
    desc: 'Computes the divergence of a vector field based on the input vector field. The input string must be formatted as a python list. Example call: divergence("[3xy, 2z^4, 2y]").'
  - name: null
    tool: laplacian
    desc: Computes the laplacian of a scalar function (as the divergence of the gradient) or a vector field (where a component-wise laplacian is computed). If a scalar function is the input, it must be input in the same format as in the gradient tool. If the input is a vector field, it must be input in the same manner as the curl/divergence tools
  - name: null
